<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <!-- Heart with Venezuelan flag and globe -->
  <g transform="translate(5,5)">
    <!-- Heart shape clip -->
    <defs>
      <clipPath id="heart-clip">
        <path d="M45,85 C45,85 5,55 5,30 C5,15 15,5 30,5 C38,5 45,10 45,18 C45,10 52,5 60,5 C75,5 85,15 85,30 C85,55 45,85 45,85Z"/>
      </clipPath>
    </defs>
    <!-- Globe background (light blue) -->
    <g clip-path="url(#heart-clip)">
      <rect x="0" y="0" width="90" height="90" fill="#4AA8D8"/>
      <!-- Globe continents suggestion -->
      <ellipse cx="35" cy="40" rx="25" ry="30" fill="none" stroke="#3A98C8" stroke-width="1.5"/>
      <path d="M20,20 C25,25 30,22 35,28 C38,32 32,38 28,42 C24,46 20,50 22,58 C24,62 28,66 32,68" fill="#2E8B57" opacity="0.5"/>
      <path d="M40,15 C42,18 48,20 50,25 C52,30 48,35 45,38" fill="#2E8B57" opacity="0.4"/>
      <!-- Venezuelan flag overlay on right side of heart -->
      <rect x="35" y="5" width="55" height="28" fill="#FFCC00"/>
      <rect x="35" y="33" width="55" height="27" fill="#003DA5"/>
      <rect x="35" y="60" width="55" height="30" fill="#CE1126"/>
      <!-- Stars on blue band -->
      <g fill="white" transform="translate(55,46)">
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="scale(0.5)"/>
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="translate(-8,0) scale(0.5)"/>
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="translate(8,0) scale(0.5)"/>
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="translate(-12,-5) scale(0.5)"/>
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="translate(12,-5) scale(0.5)"/>
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="translate(-14,5) scale(0.5)"/>
        <polygon points="0,-5 1.2,-1.5 4.8,-1.5 1.8,0.8 3,4.3 0,2 -3,4.3 -1.8,0.8 -4.8,-1.5 -1.2,-1.5" transform="translate(14,5) scale(0.5)"/>
      </g>
    </g>
    <!-- Heart outline -->
    <path d="M45,85 C45,85 5,55 5,30 C5,15 15,5 30,5 C38,5 45,10 45,18 C45,10 52,5 60,5 C75,5 85,15 85,30 C85,55 45,85 45,85Z" fill="none" stroke="#1a3a5c" stroke-width="2.5"/>
  </g>
  <!-- Text: Acopios in dark navy -->
  <text x="105" y="62" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#1a2744">Acopios</text>
  <!-- Text: Venezuela in sky blue -->
  <text x="310" y="62" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#2196D3">Venezuela</text>
  <!-- .com in smaller blue -->
  <text x="310" y="82" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#2196D3">.com</text>
</svg>